name: Scrape My Voice

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install chromium --with-deps
      - name: Scrape posts and comments
        env:
          SKOOL_EMAIL: ${{ secrets.SKOOL_EMAIL }}
          SKOOL_PASSWORD: ${{ secrets.SKOOL_PASSWORD }}
        run: node src/scrape-voice.js
      - name: Commit results
        run: |
          git config user.name "skool-bot"
          git config user.email "bot@selfworkclub.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/waseemelwilid/Skool-Community-Manager-SWC.git
          git add my-voice.json
          git diff --staged --quiet || git commit -m "chore: scrape voice samples"
          git push
