name: Bulk DM

on:
  schedule:
    - cron: '0 18 * * 6'  # Every Saturday 7pm BST (18:00 UTC)
  workflow_dispatch:
    inputs:
      message:
        description: 'Message to send to all members'
        required: true

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install chromium --with-deps
      - name: Send bulk DM
        env:
          SKOOL_EMAIL: ${{ secrets.SKOOL_EMAIL }}
          SKOOL_PASSWORD: ${{ secrets.SKOOL_PASSWORD }}
          BULK_MESSAGE: ${{ inputs.message || 'just a quick reminder we have our roleplay call tomorrow at 7pm uk time, would love to see you there!' }}
        run: node src/bulk-dm.js
