name: Skool Community Check

on:
  schedule:
    - cron: '0 8 * * *'   # 9am UK
    - cron: '0 12 * * *'  # 1pm UK
    - cron: '0 19 * * *'  # 8pm UK
    - cron: '0 21 * * *'  # 10pm UK
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install chromium --with-deps

      - name: Run community check
        env:
          SKOOL_EMAIL: ${{ secrets.SKOOL_EMAIL }}
          SKOOL_PASSWORD: ${{ secrets.SKOOL_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node src/index.js

      - name: Commit updated state
        run: |
          git config user.name "skool-bot"
          git config user.email "bot@selfworkclub.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/waseemelwilid/Skool-Community-Manager-SWC.git
          git add state.json my-voice.json
          git diff --staged --quiet || git commit -m "chore: update state and voice samples"
          git push
